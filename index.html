<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PFP Generator</title>

<style>
body{
margin:0;
padding:40px;
background:#111;
color:#fff;
font-family:sans-serif;
text-align:center;
}

button{
padding:14px 24px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;
}

canvas{
display:block;
margin:30px auto;
width:640px;
height:640px;
border-radius:12px;
background:#222;
}
</style>
</head>

<body>

<button id="generate">Generate</button>
<p id="status">Preloading assets...</p>

<canvas id="canvas" width="1024" height="1024"></canvas>

<script>

/* ==========================
CDN
========================== */

const CDN_BASE = "https://cdn.jsdelivr.net/gh/daresum/PFPGen/layers";

/* ==========================
LAYERS 1
========================== */

const LAYERS = [

{ name:"background", files:["blue.png","green.png","pink.png"] },

{ name:"base", files:["base.png"], fixed:true },

{ name:"body", files:[
"artist.png","broken.png","buffed.png","candle.png",
"coops.png", "goldchain.png","joe.png","killcheeto.png","leatherjacket.png",
"leonidas.png","mets.png", "motherinlaw.png", "omg.png","rekt.png",
"shirt.png", "taprootwizard.png", "tibbir.png","turtleneck.png",
"tux.png", "zombie.png"
]},

{ name:"head", files:[
"cap.png","wizard.png", "blonde.png", "cheetobutt.png", 
"cowboy.png", "crown.png", "curly.png", "dave.png","hair.png","ketchup.png",
"mask.png","mchat.png","meebit.png","note.png",
"punk.png","tophat.png","vampire.png"
]},

{ name:"mouth", files:[
"baby.png","braces.png","bro.png","bunny.png","car.png",
"cheer.png", "chew.png","chin.png","clown.png","cute.png",
"cutesmile.png","drool.png","feef.png","fishlips.png",
"flabergasted.png","froglip.png","frown.png","gb.png",
"grind.png","hm.png","laugh.png","line.png","lips.png",
"lipstick.png","lipsy.png","lipsy2.png","longsmile.png",
"moustache.png","nervous.png","oh.png","old.png","pika.png",
"pipe.png","puff.png","redbeard.png","smile.png",
"smug.png","toothless.png", "vampireteeth.png", "whistle.png","yell.png","zombie.png"
]},

{ name:"eyes", files:[
"3dglasses.png","anime.png","blank.png","buttons.png","cool.png",
"cyborg.png", "cyclop.png","eyepatch.png","fury.png","glasses.png","googly.png",
"happy.png", "heavy.png","holes.png","jaded.png",
"laser.png","mad.png","nerd.png","paranoid.png","pepe.png",
"pure.png","rule-one.png","sleep.png","sunglasses.png",
"surprised.png","sus.png","swirl.png","tear.png",
"third-eye.png","thug.png","tired.png","wink.png","x.png","yes.png"
]}

];

/* ==========================
EXCLUSION RULES
========================== */

const EXCLUSIONS = {

"head/note.png":[
"mouth",
"eyes"
],

"eyes/googly.png":[
"head/blonde.png"
],

"eyes/nerd.png":[
"head/dave.png"
],

"eyes/eyepatch.png":[
"head/blonde.png",
"head/dave.png",
"head/afro.png",
"head/hair.png"
],

"eyes/pepe.png":[
"head/dave.png"
],

"eyes/rule-one.png":[
"head/dave.png"
],

"eyes/sunglasses.png":[
"head/afro.png"
],

"eyes/3dglasses.png":[
"head/afro.png",
"head/blonde.png"
],

"eyes/swirl.png":[
"head/afro.png",
"head/blonde.png",
"head/vampire.png",
"mouth/bro.png",
"mouth/laugh.png",
"mouth/cheer.png"
],

"eyes/heartshape.png":[
"mouth/laugh.png"
],

"head/meebit.png":[
"eyes",
"mouth",
"body/turtleneck.png"
],

"head/mask.png":[
"eyes",
"mouth"
],

"mouth/redbeard.png":[
"body/rekt.png",
"body/leonidas.png",
"body/shirt.png",
"head/blonde.png",
"head/afro.png",
"body/candle.png",
"body/joe.png",
"body/omg.png",
"eyes/swirl.png"
],

"mouth/longsmile.png":[
"head/afro.png",
"head/blonde.png"
],

"mouth/zombie.png":[
"body/joe.png",
"body/turtleneck.png"
],

"mouth/smug.png":[
"head/blonde.png"
],

"mouth/bg.png":[
"head/blonde.png"
],

"body/turtleneck.png":[
  "mouth/toothless.png"
],

};

/* ==========================
RULE ENGINE
========================== */

function applyRules(selection){

for(const layer in selection){

const file=selection[layer];
const key=`${layer}/${file}`;

const rules=EXCLUSIONS[key];

if(!rules) continue;

for(const rule of rules){

if(!rule.includes("/")){
delete selection[rule];
continue;
}

const [ruleLayer,ruleFile]=rule.split("/");

if(selection[ruleLayer]===ruleFile){
return true;
}

}

}

return false;

}

/* ==========================
CACHE
========================== */

const IMAGE_CACHE={};

function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* ==========================
PRELOAD
========================== */

async function preloadAll(){

const status=document.getElementById("status");

const promises=[];

for(const layer of LAYERS){

for(const file of layer.files){

const key=`${layer.name}/${file}`;
const src=`${CDN_BASE}/${key}`;

promises.push(new Promise(resolve=>{

const img=new Image();

img.crossOrigin="anonymous";

img.onload=()=>{
IMAGE_CACHE[key]=img;
resolve();
};

img.onerror=()=>resolve();

img.src=src;

}));

}

}

await Promise.all(promises);

status.innerText="Ready.";

}

/* ==========================
GENERATE
========================== */

async function generatePFP(){

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

let selection;

do{

selection={};

for(const layer of LAYERS){

selection[layer.name]=layer.fixed
?layer.files[0]
:randomItem(layer.files);

}

}while(applyRules(selection));

for(const layer of LAYERS){

const file=selection[layer.name];
if(!file) continue;

const key=`${layer.name}/${file}`;

const img=IMAGE_CACHE[key];

if(img){
ctx.drawImage(img,0,0,canvas.width,canvas.height);
}

}

console.log("TRAITS:",selection);

}

/* ==========================
INIT
========================== */

document.getElementById("generate")
.addEventListener("click",generatePFP);

preloadAll();

</script>
</body>
</html>
